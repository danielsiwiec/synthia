receivers:
  prometheus:
    config:
      scrape_configs:
        - job_name: synthia
          scrape_interval: 15s
          static_configs:
            - targets:
                - synthia:8003

exporters:
  otlp:
    endpoint: host.docker.internal:4317
    tls:
      insecure: true

service:
  pipelines:
    metrics:
      receivers:
        - prometheus
      exporters:
        - otlp
