receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  prometheus:
    config:
      scrape_configs:
        - job_name: synthia
          scrape_interval: 15s
          static_configs:
            - targets:
                - synthia:8003

exporters:
  debug:
    verbosity: detailed

  otlp:
    endpoint: host.docker.internal:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers:
        - otlp
      exporters:
        - debug

    metrics:
      receivers:
        - otlp
        - prometheus
      exporters:
        - debug

    logs:
      receivers:
        - otlp
      exporters:
        - debug
