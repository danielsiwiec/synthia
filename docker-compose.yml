services:
  synthia:
    container_name: synthia
    build:
      context: .
      secrets:
        - claude_credentials
      args:
        USER_UID: ${USER_UID:-501}
        USER_GID: ${USER_GID:-20}
    ports:
      - "8003:8003"
    env_file:
      - .env
    environment:
      - CLAUDE_CODE_ENABLE_TELEMETRY=1
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_LOGS_EXPORTER=otlp
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_LOG_USER_PROMPTS=1
    depends_on:
      pgvector:
        condition: service_healthy
    volumes:
      - ./claude_home:/home/synthia/.claude
      - ./skills:/home/synthia/workdir/.claude/skills
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.claude.json:/home/synthia/.claude.json
    group_add:
      - "0"
    restart: unless-stopped

  pgvector:
    container_name: pgvector
    build:
      context: ./images/pgvector
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=vector_store
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  google-mcp:
    container_name: google-mcp
    image: workspace-mcp
    env_file:
      - .env_google_mcp
    ports:
      - "8001:8000"

  otel-collector:
    container_name: otel-collector
    image: otel/opentelemetry-collector-contrib:latest
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  pgvector_data:

secrets:
  claude_credentials:
    file: ~/.claude.json

