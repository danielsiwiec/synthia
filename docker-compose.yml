services:
  synthia:
    container_name: synthia
    build:
      context: .
      args:
        USER_UID: ${USER_UID:-501}
        USER_GID: ${USER_GID:-20}
    ports:
      - "8003:8003"
    env_file:
      - .env
    environment:
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      pgvector:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./claude_home:/home/synthia/.claude
      - ./skills:/home/synthia/workdir/.claude/skills
    restart: unless-stopped

  pgvector:
    container_name: pgvector
    build:
      context: ./images/pgvector
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=vector_store
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama:
    container_name: ollama
    build:
      context: ./images/ollama
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep nomic-embed-text"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

volumes:
  pgvector_data:
  ollama_data:
