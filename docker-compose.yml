services:
  synthia:
    container_name: synthia
    build:
      context: .
      args:
        USER_UID: ${USER_UID:-501}
        USER_GID: ${USER_GID:-20}
    ports:
      - "8003:8003"
    env_file:
      - .env
    depends_on:
      pgvector:
        condition: service_healthy
    volumes:
      - ./claude_home:/home/synthia/.claude
      - ${HOME}/.claude/.credentials.json:/home/synthia/.claude/.credentials.json
      - /Users/dansiwiec/arr/:/mounts/arr
      - /Volumes/media:/mounts/media
      - /Users/dansiwiec/Downloads:/mounts/downloads
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "0"
    restart: unless-stopped

  pgvector:
    container_name: pgvector
    build:
      context: ./images/pgvector
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=vector_store
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  google-mcp:
    container_name: google-mcp
    image: workspace-mcp
    env_file:
      - .env_google_mcp
    ports:
      - "8001:8000"

volumes:
  pgvector_data:

