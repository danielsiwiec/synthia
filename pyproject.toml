[project]
name = "daimos"
version = "0.1.0"
description = "FastAPI application with Claude Agent SDK integration"
requires-python = ">=3.13"
dependencies = [
    "langchain-core>=0.3.77",
    "python-dotenv>=1.1.1",
    "jsonschema>=4.25.1",
    "langchain-openai>=0.3.34",
    "pydantic>=2.11.9",
    "fastapi[standard]>=0.118.0",
    "claude-agent-sdk>=0.1.0",
    "loguru>=0.7.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.uv]
dev-dependencies = [
    "pytest>=8.4.2",
    "pytest-asyncio>=1.2.0",
    "ruff>=0.13.3",
]
[tool.ruff]
target-version = "py313"
line-length = 120

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]

[tool.ruff.lint.isort]
known-first-party = ["daimos"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.pytest.ini_options]
asyncio_mode = "auto"
